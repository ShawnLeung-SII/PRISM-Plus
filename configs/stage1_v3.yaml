# PRISM+ Stage 1 v0.3.0 — PRISMPlusBND + PrecisionFocusedLoss
# Targets the precision deficit identified by diagnose_noise_hypothesis.py:
#   v0.2.0:  inv_iou=0.6439  cov_det=0.9588  -> recall fine, precision is bottleneck.
# Hardware target: 4× NVIDIA H100 80GB or H200 141GB (auto batch via batch_size_by_gpu)

# --- data ---
data_root: /inspire/hdd/project/robot-dna/liangxiujian-253308390319/ByteCameraDepth
resolution: 512
num_workers: 8

# --- VFM backbone ---
vfm_type: moge2
vfm_checkpoint: /inspire/hdd/global_user/liangxiujian-253308390319/0-XIUJIANLIANG/weights/moge2.pt
encoder_size: large

# --- PRISMPlusBND specific ---
vfm_cross_attn_dim: 128
boundary_band_radius: 3

# --- GPU-adaptive batch_size ---
batch_size_by_gpu:
  H200:    32       # 141GB VRAM
  H100:    12       # 80GB VRAM (OOM-safe)
  "4090":  4        # debug only
batch_size: 12      # fallback if GPU not matched
epochs: 100
lr: 1.0e-4

# --- PrecisionFocusedLoss weights ---
w_abce:      1.0       # asymmetric BCE (FP heavy)
w_tversky:   0.5       # Tversky (alpha>beta = precision-leaning Dice)
w_sharp:     0.2       # sharpness penalty (anti-hedging)
w_bedge:     0.5       # boundary-weighted asymmetric BCE
w_coarse:    0.3       # coarse-stage supervision
w_edge_sup:  0.3       # edge head supervision

# --- Asymmetric BCE balance (the main precision lever) ---
fp_weight:   2.0       # penalty on false positives
fn_weight:   1.0       # penalty on false negatives (lower = let model miss noise dots)

# --- Tversky balance ---
tversky_alpha: 0.7     # FP weight in Tversky
tversky_beta:  0.3     # FN weight in Tversky

# --- Boundary band ---
band_radius:   2       # CVPR'21 Boundary IoU uses radius=2 (~0.4% diag)
band_weight:   4.0
edge_radius:   1

# --- Visualization ---
vis_n_samples: 10

# --- Output ---
output_dir: /inspire/hdd/global_user/liangxiujian-253308390319/0-XIUJIANLIANG/checkpoints/prism_plus/stage1_v3
