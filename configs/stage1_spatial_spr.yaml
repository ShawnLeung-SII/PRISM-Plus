# Stage 1: Spatial-SPR BND (PRISM+ C1)
# Hardware: 4x H200 SXM 141GB

data_root: /inspire/hdd/project/robot-dna/liangxiujian-253308390319/ByteCameraDepth
resolution: 512
num_workers: 8

vfm_type: moge2
vfm_checkpoint: /inspire/ssd/project/robot-dna/liangxiujian-253308390319/latpixdepth/latpixdepth/checkpoints/moge2.pt
encoder_size: large

# H200 141GB × 4: 可使用大 batch
