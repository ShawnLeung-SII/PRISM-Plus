# PRISM+ Stage 4 — TNSM on RobbyVla真实机器人 video (per-sensor LoRA-free)
v06_checkpoint: /inspire/hdd/global_user/liangxiujian-253308390319/0-XIUJIANLIANG/checkpoints/prism_plus/stage1_v6/best.pt
vfm_type: moge2
vfm_checkpoint: /inspire/hdd/global_user/liangxiujian-253308390319/0-XIUJIANLIANG/weights/moge2.pt
encoder_size: large
vfm_cross_attn_dim: 128
boundary_band_radius: 3

# TNSM
tnsm_enc_channels: 1
tnsm_state_channels: 128
tnsm_spatial_div: 4
tnsm_use_flow: true

# RAFT (torchvision pretrained, frozen)
raft_weights: C_T_V2
raft_iters: 12

# Data — RobbyVla (real robot manipulation video) on HDD
dataset_type: lingbot_robbyvla
lingbot_root: /inspire/hdd/global_user/liangxiujian-253308390319/datasets/RobbyVla
robots: [franka, ur7e]
cams: [left_realsense405, right_realsense405]
resolution: 256

# Temporal window
T: 4
stride: 1

# Optim
batch_size: 4
num_workers: 4
epochs: 30
lr: 5.0e-5
pos_weight: 3.0
ohem_ratio: 0.3

output_dir: /inspire/hdd/global_user/liangxiujian-253308390319/0-XIUJIANLIANG/checkpoints/prism_plus/stage4_tnsm_robbyvla
