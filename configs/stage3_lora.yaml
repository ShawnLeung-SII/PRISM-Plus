num_workers: 8
epochs: 30
lr: 1.0e-3            # higher LR for low-rank adapters

# ----- Output -----
output_dir: /inspire/hdd/global_user/liangxiujian-253308390319/0-XIUJIANLIANG/checkpoints/prism_plus/stage3_lora
