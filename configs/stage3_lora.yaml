# PRISM+ Stage 3 — LoRA-SPA cross-sensor fine-tune
# Frozen v0.6 backbone, rank-4 LoRA per sensor on z_sem pathway

# ----- Backbone (frozen) -----
v06_checkpoint: /inspire/hdd/global_user/liangxiujian-253308390319/0-XIUJIANLIANG/checkpoints/prism_plus/stage1_v6/best.pt
vfm_type: moge2
vfm_checkpoint: /inspire/hdd/global_user/liangxiujian-253308390319/0-XIUJIANLIANG/weights/moge2.pt
encoder_size: large
vfm_cross_attn_dim: 128
boundary_band_radius: 3

# ----- LoRA -----
